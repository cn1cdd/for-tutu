<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>for tutu</title>
  <style>
    :root{
      --bg1:#fffafc;
      --bg2:#fff1f6;
      --bg3:#fffdfd;
      --pink:#ff9dbb;
      --pink2:#ffc0d4;
      --pink3:#ffddea;
      --text:#8d6a78;
      --line:rgba(255,255,255,.92);
      --card:rgba(255,255,255,.74);
      --shadow:0 12px 32px rgba(255,178,198,.20);
      --shadow-strong:0 18px 40px rgba(255,168,192,.28);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,215,230,.88), transparent 26%),
        radial-gradient(circle at 84% 18%, rgba(255,236,244,.95), transparent 28%),
        radial-gradient(circle at 78% 78%, rgba(255,221,231,.78), transparent 24%),
        radial-gradient(circle at 22% 82%, rgba(255,240,245,.88), transparent 24%),
        linear-gradient(160deg,var(--bg1),var(--bg3) 48%,var(--bg2));
      position:relative;
      touch-action:none;
    }

    .app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .ambient{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .ambient::before{
      content:"";
      position:absolute;
      width:58vw;
      height:58vw;
      max-width:320px;
      max-height:320px;
      left:50%;
      top:42%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,243,247,.92), rgba(255,255,255,0) 70%);
      filter:blur(10px);
    }

    .float{
      position:absolute;
      pointer-events:none;
      animation: floaty var(--dur,7s) ease-in-out infinite;
      filter: drop-shadow(0 6px 12px rgba(255, 170, 190, .18));
      opacity:.92;
    }

    .float.heart{ color:var(--pink); font-size:18px; }
    .float.star{ color:#ffd66f; font-size:14px; }
    .float.dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(145deg,#ffd1df,#ffb2cc);
      box-shadow:0 0 14px rgba(255,170,190,.32);
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0) rotate(0deg);}
      50%{ transform:translateY(-12px) rotate(5deg);}
    }

    .topbar{
      position:absolute;
      top:12px;
      left:0;
      width:100%;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index:20;
    }

    .pill{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(255, 224, 231, .95);
      color:#9a6f7f;
      font-size:12px;
      backdrop-filter: blur(8px);
      box-shadow:0 8px 18px rgba(255, 188, 206, .14);
      letter-spacing:.5px;
      pointer-events:auto;
    }

    .scene{
      position:absolute;
      inset:0;
      perspective:1200px;
    }

    .board{
      position:absolute;
      left:50%;
      top:50%;
      width:min(92vw,430px);
      height:min(86vh,820px);
      transform:translate(-50%,-50%);
      border-radius:34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.55),
        0 18px 50px rgba(255, 182, 202, .10);
      pointer-events:none;
    }

    .sticker{
      position:absolute;
      background:var(--card);
      border:2px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.8);
      backdrop-filter:blur(10px);
      transition:box-shadow .25s ease, transform .22s ease;
      cursor:grab;
      pointer-events:auto;
      touch-action:none;
      transform-origin:center;
      left:auto;
      right:auto;
      bottom:auto;
    }

    .sticker:active{ cursor:grabbing; }

    .sticker.pop{ animation: popCard .36s ease; }

    .sticker.focused{
      z-index:999 !important;
      animation: focusCard .72s ease;
      box-shadow:0 20px 50px rgba(255,155,185,.35);
    }

    @keyframes popCard{
      0%{ transform:scale(1) rotate(var(--r)); }
      40%{ transform:scale(1.06) rotate(calc(var(--r) + 2deg)); }
      100%{ transform:scale(1) rotate(var(--r)); }
    }

    @keyframes focusCard{
      0%{ transform:scale(1) rotate(var(--r)); }
      45%{ transform:scale(1.15) rotate(calc(var(--r) + 1deg)); }
      100%{ transform:scale(1) rotate(var(--r)); }
    }

    .sticker img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      background:#fff6fa;
    }

    .tape{
      display:none;
    }

    .mini{
      position:absolute;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(255, 222, 230, .94);
      color:var(--text);
      font-size:11px;
      box-shadow:0 8px 18px rgba(255,188,206,.16);
      backdrop-filter:blur(6px);
      z-index:10;
      pointer-events:none;
    }

    .badge{
      position:absolute;
      width:78px;
      height:78px;
      border-radius:50%;
      background:rgba(255,255,255,.72);
      border:2px solid rgba(255,255,255,.92);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#e68cab;
      font-size:30px;
      z-index:16;
      pointer-events:auto;
      transition:transform .25s ease, box-shadow .25s ease;
    }

    .badge:active{
      transform:scale(1.06);
      box-shadow:var(--shadow-strong);
    }

    .s1{ width:124px; height:156px; left:8%;  top:16%; --r:-8deg; transform:rotate(-8deg); }
    .s2{ width:146px; height:102px; right:8%; top:15%; --r:7deg;  transform:rotate(7deg); }
    .s3{ width:124px; height:158px; right:11%; top:37%; --r:8deg; transform:rotate(8deg); }
    .s4{ width:138px; height:96px;  left:9%;  top:45%; --r:-5deg; transform:rotate(-5deg); }
    .s5{ width:138px; height:166px; left:13%; bottom:18%; --r:7deg; transform:rotate(7deg); }
    .s6{ width:82px;  height:82px;  right:17%; bottom:19%; --r:-4deg; transform:rotate(-4deg); border-radius:50%; }
    .s7{ width:118px; height:154px; left:38%; top:28%; --r:-6deg; transform:rotate(-6deg); }

    .spark{
      left:22px;
      bottom:94px;
      font-size:26px;
      background:linear-gradient(145deg, rgba(255,255,255,.82), rgba(255,249,236,.76));
      color:#f0b43a;
    }

    .name{
      position:absolute;
      right:16px;
      bottom:14px;
      text-align:right;
      color:rgba(128, 98, 110, .62);
      font-size:11px;
      z-index:30;
      letter-spacing:.8px;
      pointer-events:none;
    }

    .name span{
      display:block;
      margin-top:3px;
      font-size:10px;
      opacity:.84;
    }

    .hint{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.52);
      color:rgba(148,109,122,.58);
      font-size:10px;
      z-index:25;
      backdrop-filter:blur(6px);
      pointer-events:none;
    }

    .burst-heart{
      position:fixed;
      pointer-events:none;
      z-index:999;
      animation: burst 900ms ease-out forwards;
      filter:drop-shadow(0 4px 10px rgba(255,130,170,.25));
    }

    @keyframes burst{
      0%{ transform:translate(0,0) scale(.7); opacity:0; }
      15%{opacity:1;}
      100%{
        transform:translate(var(--x),var(--y)) scale(1.26) rotate(var(--rot));
        opacity:0;
      }
    }

    .drag-trail{
      position:fixed;
      pointer-events:none;
      z-index:998;
      animation: trailFly .85s ease-out forwards;
      filter:drop-shadow(0 6px 14px rgba(255,150,185,.28));
      opacity:.95;
    }

    .drag-trail.heart{
      color:#ff95b6;
      font-size:22px;
    }

    .drag-trail.star{
      color:#ffd56c;
      font-size:18px;
    }

    .drag-trail.bubble{
      width:18px;
      height:18px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), rgba(255,199,221,.7) 45%, rgba(255,199,221,0) 75%);
      box-shadow:0 0 18px rgba(255,176,201,.35);
    }

    @keyframes trailFly{
      0%{
        transform:translate(0,0) scale(.75) rotate(0deg);
        opacity:0;
      }
      15%{ opacity:1; }
      100%{
        transform:translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--rot));
        opacity:0;
      }
    }

    .drop-emoji{
      position:fixed;
      pointer-events:none;
      z-index:997;
      font-size:18px;
      animation: dropEmoji 1200ms ease-out forwards;
      filter:drop-shadow(0 4px 10px rgba(255,150,180,.2));
    }

    @keyframes dropEmoji{
      0%{ transform:translateY(-8px) scale(.8) rotate(0deg); opacity:0; }
      15%{ opacity:1; }
      100%{ transform:translateY(90px) scale(1.1) rotate(20deg); opacity:0; }
    }

    .rain-heart{
      position:fixed;
      top:-20px;
      pointer-events:none;
      z-index:996;
      animation: heartRain linear forwards;
    }

    @keyframes heartRain{
      to{
        transform:translateY(110vh) rotate(180deg);
        opacity:0;
      }
    }

    .sugar-mode{
      animation:sugarFlash .6s ease;
    }

    @keyframes sugarFlash{
      0%{ filter:saturate(1) brightness(1); }
      50%{ filter:saturate(1.08) brightness(1.03); }
      100%{ filter:saturate(1) brightness(1); }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="ambient">
      <div class="float heart" style="left:14%; top:10%; --dur:6.6s;">❤</div>
      <div class="float star"  style="left:48%; top:9%; --dur:7.2s;">✦</div>
      <div class="float heart" style="right:14%; top:22%; --dur:6.2s;">❤</div>
      <div class="float dot"   style="left:9%; top:32%; --dur:7.8s;"></div>
      <div class="float star"  style="right:20%; top:54%; --dur:6.9s;">✦</div>
      <div class="float heart" style="left:20%; bottom:18%; --dur:7.4s;">❤</div>
      <div class="float dot"   style="right:11%; bottom:30%; --dur:8s;"></div>
      <div class="float star"  style="left:58%; bottom:16%; --dur:6.7s;">✦</div>
    </div>

    <div class="topbar">
      <div class="pill" id="topMagic">tutu</div>
    </div>

    <div class="scene" id="scene">
      <div class="board"></div>

      <div class="mini" style="left:16%; top:12%;">♡</div>
      <div class="mini" style="right:16%; top:33%;">ฅ^•ﻌ•^ฅ</div>
      <div class="mini" style="left:42%; bottom:28%;">✦</div>

      <div class="sticker s1 draggable">
        <img src="./images/1.jpg" alt="">
      </div>

      <div class="sticker s2 draggable">
        <img src="./images/2.jpg" alt="">
      </div>

      <div class="sticker s3 draggable">
        <img src="./images/6.jpg" alt="">
      </div>

      <div class="sticker s4 draggable">
        <img src="./images/3.jpg" alt="">
      </div>

      <div class="sticker s5 draggable">
        <img src="./images/7.jpg" alt="">
      </div>

      <div class="sticker s6 draggable">
        <img src="./images/4.jpg" alt="">
      </div>

      <div class="sticker s7 draggable">
        <img src="./images/5.jpg" alt="">
      </div>

      <div class="badge spark" id="sparkBtn">🎡</div>
    </div>

    <div class="hint">tap · drag · hold · shake</div>

    <div class="name">
      肖添锦
      <span>for tutu</span>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');
    const scene = document.getElementById('scene');
    const sparkBtn = document.getElementById('sparkBtn');
    const topMagic = document.getElementById('topMagic');

    function burst(x, y, count = 10) {
      const icons = ['❤','♡','♥','✦','💗'];
      for (let i = 0; i < count; i++) {
        const el = document.createElement('span');
        el.className = 'burst-heart';
        el.textContent = icons[Math.floor(Math.random() * icons.length)];
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = i % 4 === 0 ? '#ffd66f' : (i % 2 ? '#ff9dbb' : '#ffbdd1');
        el.style.fontSize = (14 + Math.random() * 10) + 'px';
        el.style.setProperty('--x', (Math.random() * 130 - 65) + 'px');
        el.style.setProperty('--y', (-25 - Math.random() * 135) + 'px');
        el.style.setProperty('--rot', (Math.random() * 80 - 40) + 'deg');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }
    }

    function dropEmoji(x, y, count = 5){
      const arr = ['🐾','💗','✨','🐱','🐰','🩷'];
      for(let i=0;i<count;i++){
        const el = document.createElement('div');
        el.className = 'drop-emoji';
        el.textContent = arr[Math.floor(Math.random()*arr.length)];
        el.style.left = (x + Math.random()*40 - 20) + 'px';
        el.style.top = (y + Math.random()*20 - 10) + 'px';
        el.style.animationDelay = (Math.random()*0.08) + 's';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), 1200);
      }
    }

    function heartRain(times = 18){
      for(let i=0;i<times;i++){
        const el = document.createElement('div');
        el.className = 'rain-heart';
        el.textContent = Math.random() > 0.3 ? '❤' : '✦';
        el.style.left = Math.random()*100 + 'vw';
        el.style.fontSize = (12 + Math.random()*16) + 'px';
        el.style.color = Math.random()>0.25 ? '#ff9dbb' : '#ffd66f';
        el.style.opacity = 0.9;
        el.style.animationDuration = (1.8 + Math.random()*1.8) + 's';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), 3800);
      }
    }

    function sugarMode(x, y){
      app.classList.remove('sugar-mode');
      void app.offsetWidth;
      app.classList.add('sugar-mode');
      burst(x, y, 18);
      dropEmoji(x, y, 10);
      heartRain(26);
      setTimeout(()=>app.classList.remove('sugar-mode'), 700);
    }

    function randomFocusCard(){
      const cards = [...document.querySelectorAll('.sticker')];
      const card = cards[Math.floor(Math.random()*cards.length)];
      card.classList.remove('focused');
      void card.offsetWidth;
      card.classList.add('focused');
      const rect = card.getBoundingClientRect();
      burst(rect.left + rect.width/2, rect.top + rect.height/2, 12);
      setTimeout(()=>card.classList.remove('focused'), 720);
    }

    function createDragTrail(x, y){
      const types = ['heart','star','bubble'];
      const count = 3;
      for(let i = 0; i < count; i++){
        const type = types[Math.floor(Math.random()*types.length)];
        const el = document.createElement('div');
        el.className = `drag-trail ${type}`;
        if(type === 'heart') el.textContent = Math.random() > 0.5 ? '❤' : '♡';
        if(type === 'star') el.textContent = '✦';

        el.style.left = (x + Math.random()*24 - 12) + 'px';
        el.style.top = (y + Math.random()*24 - 12) + 'px';
        el.style.setProperty('--tx', (Math.random()*90 - 45) + 'px');
        el.style.setProperty('--ty', (Math.random()*70 - 35) + 'px');
        el.style.setProperty('--rot', (Math.random()*100 - 50) + 'deg');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 850);
      }
    }

    app.addEventListener('click', (e) => {
      const clickable = e.target.closest('.sticker,.badge,.pill');
      if (!clickable) burst(e.clientX, e.clientY, 8);
    });

    sparkBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight * 0.55;
      sugarMode(centerX, centerY);
      for (let i = 0; i < 18; i++) {
        setTimeout(() => {
          const x = Math.random() * window.innerWidth;
          const y = Math.random() * window.innerHeight * 0.82;
          burst(x, y, 5);
        }, i * 35);
      }
    });

    topMagic.addEventListener('click', (e) => {
      e.stopPropagation();
      randomFocusCard();
      burst(window.innerWidth * 0.5, 88, 12);
    });

    document.querySelectorAll('.sticker').forEach((card, idx) => {
      let t = Math.random() * Math.PI * 2;
      function breathe() {
        if (card.dataset.dragging === '1') {
          requestAnimationFrame(breathe);
          return;
        }
        if (card.dataset.moved === '1') {
          requestAnimationFrame(breathe);
          return;
        }
        t += 0.018 + idx * 0.001;
        const y = Math.sin(t) * 2.2;
        const rotate = Math.sin(t * 0.9) * 0.9;
        const base = getComputedStyle(card).getPropertyValue('--r') || '0deg';
        card.style.transform = `translateY(${y}px) rotate(calc(${base} + ${rotate}deg))`;
        requestAnimationFrame(breathe);
      }
      breathe();
    });

    document.querySelectorAll('.sticker').forEach(card => {
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.remove('pop');
        void card.offsetWidth;
        card.classList.add('pop');
        const rect = card.getBoundingClientRect();
        const x = rect.left + rect.width/2;
        const y = rect.top + rect.height/2;
        burst(x, y, 8);
        dropEmoji(x, y, 5);
      });
    });

    let z = 20;
    document.querySelectorAll('.draggable').forEach(card => {
      let startX = 0, startY = 0;
      let originX = 0, originY = 0;
      let dragging = false;
      let lastTrailTime = 0;
      let movedEnough = false;

      const onMove = (clientX, clientY) => {
        const dx = clientX - startX;
        const dy = clientY - startY;

        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) movedEnough = true;

        card.style.left = `${originX + dx}px`;
        card.style.top = `${originY + dy}px`;
        card.style.right = 'auto';
        card.style.bottom = 'auto';
        card.style.transform = `rotate(${getComputedStyle(card).getPropertyValue('--r') || '0deg'})`;
        card.dataset.moved = '1';

        const now = Date.now();
        if(now - lastTrailTime > 24){
          createDragTrail(clientX, clientY);
          lastTrailTime = now;
        }
      };

      const down = (clientX, clientY) => {
        dragging = true;
        movedEnough = false;
        card.dataset.dragging = '1';
        card.style.zIndex = ++z;
        card.style.transition = 'none';

        const rect = card.getBoundingClientRect();
        card.style.left = rect.left + 'px';
        card.style.top = rect.top + 'px';
        card.style.right = 'auto';
        card.style.bottom = 'auto';

        startX = clientX;
        startY = clientY;
        originX = rect.left;
        originY = rect.top;
      };

      const up = () => {
        if (!dragging) return;
        dragging = false;
        card.dataset.dragging = '0';
        card.style.transition = '';
        if (!movedEnough) card.dataset.moved = card.dataset.moved || '0';
      };

      card.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        down(e.clientX, e.clientY);
        card.setPointerCapture(e.pointerId);
      });

      card.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        onMove(e.clientX, e.clientY);
      });

      card.addEventListener('pointerup', up);
      card.addEventListener('pointercancel', up);
    });

    function setTilt(xRatio, yRatio) {
      const rx = (0.5 - yRatio) * 4;
      const ry = (xRatio - 0.5) * 5;
      scene.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    }

    window.addEventListener('mousemove', (e) => {
      setTilt(e.clientX / window.innerWidth, e.clientY / window.innerHeight);
    });

    window.addEventListener('deviceorientation', (e) => {
      const gamma = Math.max(-20, Math.min(20, e.gamma || 0));
      const beta = Math.max(-20, Math.min(20, (e.beta || 0) - 45));
      const xRatio = (gamma + 20) / 40;
      const yRatio = (beta + 20) / 40;
      setTilt(xRatio, yRatio);
    });

    let holdTimer = null;
    app.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.sticker,.badge,.pill')) return;
      holdTimer = setTimeout(() => {
        sugarMode(e.clientX, e.clientY);
      }, 420);
    });

    ['pointerup','pointercancel','pointermove'].forEach(evt => {
      app.addEventListener(evt, () => clearTimeout(holdTimer));
    });

    let lastTap = 0;
    app.addEventListener('pointerup', (e) => {
      if (e.target.closest('.sticker,.badge,.pill')) return;
      const now = Date.now();
      if (now - lastTap < 280) randomFocusCard();
      lastTap = now;
    });

    let lastShakeTime = 0;
    window.addEventListener('devicemotion', (e) => {
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      const strength = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
      const now = Date.now();
      if (strength > 38 && now - lastShakeTime > 1500) {
        lastShakeTime = now;
        sugarMode(window.innerWidth * 0.5, window.innerHeight * 0.55);
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        burst(window.innerWidth * 0.5, window.innerHeight * 0.55, 18);
      }, 300);
    });
  </script>
</body>
</html>
